name: Release

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: namespace-profile-jetscale-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Semantic Release
        id: semrel
        uses: go-semantic-release/action@v1
        with:
          github-token: ${{ secrets.JETSCALEBOT_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Login to GHCR
        if: steps.semrel.outputs.version != ''
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        if: steps.semrel.outputs.version != ''
        uses: docker/setup-buildx-action@v3

      - name: Extract Atlantis version from Dockerfile
        if: steps.semrel.outputs.version != ''
        id: atlantis
        run: |
          ATLANTIS_VERSION=$(grep -oP 'ARG ATLANTIS_VERSION=\K[^\s]+' Dockerfile)
          echo "version=${ATLANTIS_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build and Push
        if: steps.semrel.outputs.version != ''
        env:
          ATLANTIS_VERSION: ${{ steps.atlantis.outputs.version }}
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          SHA_SHORT=$(git rev-parse --short HEAD)
          IMAGE="ghcr.io/${OWNER_LC}/atlantis"
          
          docker buildx build \
            --file ./Dockerfile \
            --target atlantis \
            --build-arg "ATLANTIS_VERSION=${ATLANTIS_VERSION}" \
            --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            --label "org.opencontainers.image.version=${ATLANTIS_VERSION}" \
            --label "org.opencontainers.image.revision=$(git rev-parse HEAD)" \
            --label "org.opencontainers.image.created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            --label "org.opencontainers.image.base.name=ghcr.io/runatlantis/atlantis:${ATLANTIS_VERSION}" \
            --push \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --tag "${IMAGE}:${ATLANTIS_VERSION}" \
            --tag "${IMAGE}:latest" \
            --tag "${IMAGE}:sha-${SHA_SHORT}" \
            .

      - name: Push Git Tag
        if: steps.semrel.outputs.version != ''
        env:
          ATLANTIS_VERSION: ${{ steps.atlantis.outputs.version }}
        run: |
          git tag "${ATLANTIS_VERSION}"
          git push origin "${ATLANTIS_VERSION}"
